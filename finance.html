<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0b">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Expenses</title>
  <script src="https://cdn.jsdelivr.net/npm/appwrite@26.1.0"></script>
  <script src="topbar.js" defer></script>
  <style>
    :root {
      --bg: #0A0A0B;
      --bg-deep: #050506;
      --bg-card: rgba(255, 255, 255, 0.04);
      --bg-secondary: rgba(255, 255, 255, 0.025);
      --bg-input: rgba(0, 0, 0, 0.28);
      --border: rgba(255, 255, 255, 0.06);
      --border-soft: rgba(255, 255, 255, 0.04);
      --border-strong: rgba(255, 255, 255, 0.12);
      
      --glass-bg: rgba(255, 255, 255, 0.04);
      --glass-border: rgba(255, 255, 255, 0.06);
      --glass-border-strong: rgba(255, 255, 255, 0.12);
      --glass-shadow: 
        0 1px 0 0 rgba(255, 255, 255, 0.06) inset,
        0 12px 40px rgba(0, 0, 0, 0.45),
        0 1px 2px rgba(0, 0, 0, 0.25);

      --text-primary: #FAFAFA;
      --text-secondary: #B8B6B0;
      --text-tertiary: #76746E;
      --text-quaternary: #4D4B47;
      
      --accent: #E07658; /* Coral accent */
      --danger: #FF6B6B;
      --success: #6BE3A4;
      
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      color-scheme: dark;
    }

    /* Light Theme variables matching the topbar overrides */
    html.light-theme {
      --bg: #F4F4F6;
      --bg-deep: #EAEAEF;
      --bg-card: #FFFFFF;
      --bg-secondary: #F8F8FA;
      --bg-input: #F3F3F6;
      --border: rgba(0, 0, 0, 0.08);
      --border-soft: rgba(0, 0, 0, 0.05);
      --border-strong: rgba(0, 0, 0, 0.15);
      
      --glass-bg: #FFFFFF;
      --glass-border: rgba(0, 0, 0, 0.06);
      --glass-border-strong: rgba(0, 0, 0, 0.1);
      --glass-shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
      
      --text-primary: #1A1A1E;
      --text-secondary: #4A4A52;
      --text-tertiary: #8A8A96;
      --text-quaternary: #A0A0B0;
      
      color-scheme: light !important;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      min-height: 100%;
    }

    /* Subtle backdrop washes */
    body::before {
      content: '';
      position: fixed;
      inset: -10%;
      z-index: -2;
      background:
        radial-gradient(60% 45% at 82% 14%, rgba(224, 118, 88, 0.12) 0%, transparent 55%),
        radial-gradient(55% 45% at 18% 90%, rgba(180, 180, 200, 0.04) 0%, transparent 55%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
      filter: blur(40px) saturate(1.05);
      pointer-events: none;
    }
    
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
      background-size: 3px 3px;
      opacity: 0.7;
      pointer-events: none;
    }

    html.light-theme body::after {
      background-image: radial-gradient(rgba(0, 0, 0, 0.02) 1px, transparent 1px) !important;
    }

    .shell {
      max-width: 640px;
      margin: 0 auto;
      padding-top: max(24px, env(safe-area-inset-top));
      padding-left: max(16px, env(safe-area-inset-left));
      padding-right: max(16px, env(safe-area-inset-right));
      padding-bottom: max(60px, env(safe-area-inset-bottom));
    }

    /* Back Button styling */
    .fin-back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px 8px 10px;
      margin: 0 0 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s ease, color 0.15s ease;
    }
    .fin-back-btn:hover {
      background: var(--border-soft);
      color: var(--text-primary);
    }
    .fin-back-btn svg { display: block; }

    /* Heading styling */
    .dash-title {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 24px;
      background: linear-gradient(180deg, var(--text-primary) 0%, var(--text-secondary) 120%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: var(--text-primary);
    }
    html.light-theme .dash-title {
      background: linear-gradient(180deg, #1A1A1E 0%, #5A5A66 120%) !important;
      -webkit-background-clip: text !important;
      background-clip: text !important;
      color: transparent !important;
    }

    /* Prominent Spend Cards */
    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 28px;
    }
    @media (max-width: 480px) {
      .summary-grid {
        grid-template-columns: 1fr;
      }
    }
    .summary-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      border-radius: var(--radius-lg);
      padding: 20px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      transition: transform 0.15s;
    }
    .summary-card:hover {
      transform: translateY(-2px);
    }
    .card-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      margin-bottom: 6px;
    }
    .card-val {
      font-size: 30px;
      font-weight: 800;
      color: var(--text-primary);
      font-family: var(--font-mono);
      letter-spacing: -0.02em;
    }

    /* Add Expenditure Section */
    .section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
    }

    .add-expense-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      border-radius: var(--radius-lg);
      padding: 20px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      margin-bottom: 32px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 140px 150px;
      gap: 12px;
      align-items: flex-end;
    }
    @media (max-width: 580px) {
      .form-grid {
        grid-template-columns: 1fr;
      }
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .form-group label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
    }
    .input-field {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 14px;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    .input-field:focus {
      border-color: var(--accent);
      outline: none;
      box-shadow: 0 0 0 2px rgba(224, 118, 88, 0.15);
    }
    .input-field::placeholder {
      color: var(--text-tertiary);
    }
    
    .btn-log {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      background: var(--text-primary);
      color: var(--bg);
      border: none;
      border-radius: var(--radius-md);
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s, transform 0.10s;
    }
    .btn-log:hover {
      opacity: 0.9;
    }
    .btn-log:active {
      transform: scale(0.97);
    }
    .btn-log:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    
    /* Expense List Section */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-tertiary);
      font-size: 14px;
      border: 1px dashed var(--border);
      border-radius: var(--radius-lg);
    }

    .expense-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .expense-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-md);
      transition: background 0.15s, border-color 0.15s, opacity 0.2s;
    }
    .expense-item:hover {
      background: var(--bg-card);
      border-color: var(--border);
    }
    .expense-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0; /* truncate text overflow safety */
    }
    .expense-desc {
      font-size: 14.5px;
      font-weight: 600;
      color: var(--text-primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .expense-date {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-tertiary);
    }
    .expense-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    .expense-amt {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
      font-family: var(--font-mono);
    }
    
    .action-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border: 1px solid transparent;
      background: transparent;
      border-radius: var(--radius-sm);
      color: var(--text-tertiary);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.15s, background 0.15s, border-color 0.15s;
    }
    .action-btn:hover {
      color: var(--text-primary);
      background: var(--bg-card);
      border-color: var(--border);
    }
    .action-btn.delete:hover {
      color: var(--danger);
      background: rgba(255, 107, 107, 0.08);
      border-color: rgba(255, 107, 107, 0.15);
    }

    /* Modal Styling */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
      padding: 16px;
    }
    .modal-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }
    .modal-card {
      width: 100%;
      max-width: 420px;
      background: var(--bg);
      border: 1px solid var(--glass-border-strong);
      box-shadow: var(--glass-shadow);
      border-radius: var(--radius-lg);
      padding: 24px;
      transform: scale(0.95);
      transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .modal-overlay.show .modal-card {
      transform: scale(1);
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .modal-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .modal-close {
      background: transparent;
      border: none;
      color: var(--text-tertiary);
      cursor: pointer;
      padding: 4px;
    }
    .modal-close:hover {
      color: var(--text-primary);
    }
    .modal-body {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 24px;
    }
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    
    .btn-secondary {
      padding: 10px 16px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .btn-secondary:hover {
      background: var(--bg-card);
      color: var(--text-primary);
    }
    .btn-primary {
      padding: 10px 18px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius-md);
      color: #FFFFFF;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-primary:hover {
      opacity: 0.9;
    }
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="shell">
    <!-- Back to Dashboard -->
    <a href="index.html" class="fin-back-btn" id="backBtn" aria-label="Back to dashboard">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
      Back
    </a>

    <!-- Title -->
    <h1 class="dash-title">Expenses</h1>

    <!-- Summary Cards -->
    <section class="summary-grid" aria-label="Spending Summary">
      <div class="summary-card">
        <div class="card-label">This Week's Spend</div>
        <div class="card-val" id="weekSpend">₹0</div>
      </div>
      <div class="summary-card">
        <div class="card-label">This Month's Spend</div>
        <div class="card-val" id="monthSpend">₹0</div>
      </div>
    </section>

    <!-- Spending Trend Chart -->
    <section aria-label="Spending trend">
      <div class="section-title">Spending Trend</div>
      <div class="add-expense-card" style="padding: 18px 20px 14px; margin-bottom: 28px;">
        <div class="card-label" style="margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center;">
          <span>Last 7 Days Spending</span>
          <span id="chartAverage" style="font-family: var(--font-mono); text-transform: none; font-size: 11px; color: var(--text-secondary);">Avg: ₹0/day</span>
        </div>
        <div class="trend-chart-container" style="position: relative;">
          <svg id="trendChart" viewBox="0 0 320 140" preserveAspectRatio="none" style="width: 100%; height: 140px; display: block; overflow: visible;">
            <!-- Dynamically populated -->
          </svg>
        </div>
      </div>
    </section>

    <!-- Add Expenditure Form -->
    <section aria-label="Log new expenditure">
      <div class="section-title">Log Expenditure</div>
      <div class="add-expense-card">
        <form id="expenseForm" class="form-grid">
          <div class="form-group">
            <label for="expDesc">What was it for?</label>
            <input type="text" id="expDesc" class="input-field" placeholder="e.g. Cab ride, Groceries" required autocomplete="off">
          </div>
          <div class="form-group">
            <label for="expAmount">Amount (₹)</label>
            <input type="number" id="expAmount" class="input-field" placeholder="₹ Amount" required min="0.01" step="any" inputmode="decimal">
          </div>
          <div class="form-group">
            <label for="expDate">Date</label>
            <input type="date" id="expDate" class="input-field" required>
          </div>
          <button type="submit" class="btn-log" id="addExpBtn" style="grid-column: span 1;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            Log
          </button>
        </form>
      </div>
    </section>

    <!-- Expense List -->
    <section aria-label="Recent Expenditures">
      <div class="section-title">Recent Expenditures</div>
      <div id="loadingState" class="empty-state" style="border-style: dashed;">
        <div style="display: inline-block; width: 14px; height: 14px; border: 2px solid var(--text-tertiary); border-radius: 50%; border-top-color: var(--text-primary); animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px;"></div>
        Loading expenditures from Appwrite...
      </div>
      <div id="emptyState" class="empty-state" style="display: none;">No expenditures logged yet.</div>
      <div id="errorState" class="empty-state" style="display: none; border-color: var(--danger); color: var(--danger);">Failed to connect to Appwrite.</div>
      <div id="expenseList" class="expense-list" style="display: none;"></div>
    </section>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="editModal" aria-hidden="true" role="dialog">
    <div class="modal-card">
      <div class="modal-header">
        <h2 class="modal-title">Edit Expenditure</h2>
        <button class="modal-close" id="closeModalBtn" aria-label="Close modal">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editId">
        <div class="form-group">
          <label for="editDesc">What was it for?</label>
          <input type="text" id="editDesc" class="input-field" required autocomplete="off">
        </div>
        <div class="form-group">
          <label for="editAmount">Amount (₹)</label>
          <input type="number" id="editAmount" class="input-field" required min="0.01" step="any" inputmode="decimal">
        </div>
        <div class="form-group">
          <label for="editDate">Date</label>
          <input type="date" id="editDate" class="input-field" required>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="cancelModalBtn">Cancel</button>
        <button class="btn-primary" id="saveModalBtn">Save Changes</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      'use strict';

      // Appwrite Configuration
      const client = new Appwrite.Client();
      client
        .setEndpoint('https://cloud.appwrite.io/v1')
        .setProject('6a524830000a1a6c4eee');

      const databases = new Appwrite.Databases(client);
      const DATABASE_ID = '6a52491c00049194c4d1';
      const COLLECTION_ID = 'expenses';

      let expenses = [];
      let editingExpenseId = null;

      // DOM Selectors
      const expenseForm = document.getElementById('expenseForm');
      const expDesc = document.getElementById('expDesc');
      const expAmount = document.getElementById('expAmount');
      const expDate = document.getElementById('expDate');
      const addExpBtn = document.getElementById('addExpBtn');
      
      const weekSpendEl = document.getElementById('weekSpend');
      const monthSpendEl = document.getElementById('monthSpend');
      
      const loadingState = document.getElementById('loadingState');
      const emptyState = document.getElementById('emptyState');
      const errorState = document.getElementById('errorState');
      const expenseList = document.getElementById('expenseList');

      // Edit Modal DOM Selectors
      const editModal = document.getElementById('editModal');
      const editId = document.getElementById('editId');
      const editDesc = document.getElementById('editDesc');
      const editAmount = document.getElementById('editAmount');
      const editDate = document.getElementById('editDate');
      const closeModalBtn = document.getElementById('closeModalBtn');
      const cancelModalBtn = document.getElementById('cancelModalBtn');
      const saveModalBtn = document.getElementById('saveModalBtn');

      // Date Helpers
      function getTodayDateString() {
        const d = new Date();
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${y}-${m}-${day}`;
      }

      function parseLocalDate(dateStr) {
        if (!dateStr) return new Date();
        const [y, m, d] = dateStr.split('-').map(Number);
        return new Date(y, m - 1, d);
      }

      function formatLongDate(dateStr) {
        const dateObj = parseLocalDate(dateStr);
        return dateObj.toLocaleDateString('en-IN', {
          year: 'numeric',
          month: 'long',
          day: 'numeric'
        });
      }

      // Currency Formatter
      function formatRupee(amount) {
        const num = Number(amount) || 0;
        const formatted = num.toLocaleString('en-IN', {
          minimumFractionDigits: 0,
          maximumFractionDigits: 2
        });
        return '₹' + formatted;
      }

      // Fetch expenses from Appwrite
      async function fetchExpenses() {
        loadingState.style.display = 'block';
        emptyState.style.display = 'none';
        errorState.style.display = 'none';
        expenseList.style.display = 'none';
        
        try {
          const res = await databases.listDocuments(DATABASE_ID, COLLECTION_ID);
          expenses = res.documents.map(doc => ({
            id: doc.$id,
            desc: doc.title || '',
            amount: parseFloat(doc.amount) || 0, // CRITICAL DATA NOTE: Parse text amount to number
            date: doc.date || ''
          }));
          loadingState.style.display = 'none';
          
          // Save local backup cache
          try {
            localStorage.setItem('local_expenses_backup', JSON.stringify(expenses));
          } catch(e) {}
          
          render();
        } catch (err) {
          console.error('Appwrite fetch error:', err);
          loadingState.style.display = 'none';
          errorState.style.display = 'block';
          errorState.textContent = 'Failed to fetch items from Appwrite: ' + (err.message || err);
          
          // Fallback to local storage backup if available
          try {
            const backup = localStorage.getItem('local_expenses_backup');
            if (backup) {
              expenses = JSON.parse(backup);
              render();
            }
          } catch (e) {}
        }
      }

      // Calculate totals
      function calculateSummary() {
        const now = new Date();
        
        // --- Week Spend: Monday to Sunday of the current week ---
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const day = today.getDay(); // 0 is Sunday, 1 is Monday, etc.
        const diff = today.getDate() - day + (day === 0 ? -6 : 1);
        const monday = new Date(today.setDate(diff));
        monday.setHours(0, 0, 0, 0);

        const sunday = new Date(monday);
        sunday.setDate(monday.getDate() + 6);
        sunday.setHours(23, 59, 59, 999);

        // --- Month Spend: 1st to end of current month ---
        const year = now.getFullYear();
        const month = now.getMonth();
        const firstOfMonth = new Date(year, month, 1, 0, 0, 0, 0);
        const endOfMonth = new Date(year, month + 1, 0, 23, 59, 59, 999);

        let weekSpend = 0;
        let monthSpend = 0;

        expenses.forEach(item => {
          const itemDate = parseLocalDate(item.date);
          const amt = Number(item.amount) || 0;
          if (itemDate >= monday && itemDate <= sunday) {
            weekSpend += amt;
          }
          if (itemDate >= firstOfMonth && itemDate <= endOfMonth) {
            monthSpend += amt;
          }
        });

        weekSpendEl.textContent = formatRupee(weekSpend);
        monthSpendEl.textContent = formatRupee(monthSpend);
      }

      function renderChart() {
        const trendChart = document.getElementById('trendChart');
        const chartAverage = document.getElementById('chartAverage');
        if (!trendChart) return;

        // Generate last 7 days array (ending today)
        const days = [];
        for (let i = 6; i >= 0; i--) {
          const d = new Date();
          d.setDate(d.getDate() - i);
          const dateStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
          days.push({
            dateStr,
            dayName: d.toLocaleDateString('en-IN', { weekday: 'short' }),
            amount: 0
          });
        }

        // Aggregate spend per day
        let totalLast7Days = 0;
        expenses.forEach(item => {
          const match = days.find(day => day.dateStr === item.date);
          if (match) {
            match.amount += Number(item.amount) || 0;
            totalLast7Days += Number(item.amount) || 0;
          }
        });

        // Calculations
        const averageSpend = totalLast7Days / 7;
        chartAverage.textContent = `Avg: ${formatRupee(averageSpend)}/day`;

        const maxAmount = Math.max(...days.map(d => d.amount), 0) || 1000;

        // SVG rendering parameters
        // Width of viewBox: 320, Height: 140
        // Baseline for bars: y = 110. Top limit: y = 20 (height limit: 90px)
        const chartHeight = 90;
        const baselineY = 110;
        const barWidth = 24;
        const spacing = 16;
        const startX = 20;

        let svgHtml = '';

        // Add subtle horizontal grid lines (dashed)
        const gridLines = [20, 65, 110];
        gridLines.forEach(y => {
          svgHtml += `<line x1="10" y1="${y}" x2="310" y2="${y}" stroke="var(--border)" stroke-width="1" stroke-dasharray="3 3"></line>`;
        });

        days.forEach((day, i) => {
          const x = startX + i * (barWidth + spacing);
          const barHeight = Math.max(day.amount > 0 ? 4 : 0, (day.amount / maxAmount) * chartHeight);
          const y = baselineY - barHeight;

          // Background guide track
          svgHtml += `
            <rect x="${x}" y="20" width="${barWidth}" height="${chartHeight}" rx="4" ry="4" style="fill: var(--bg-secondary); opacity: 0.5;"></rect>
          `;

          // Filled bar
          if (day.amount > 0) {
            svgHtml += `
              <rect x="${x}" y="${y}" width="${barWidth}" height="${barHeight}" rx="4" ry="4" fill="var(--accent)" style="transition: all 0.3s;"></rect>
            `;
            // Value text above the bar
            svgHtml += `
              <text x="${x + barWidth/2}" y="${y - 6}" fill="var(--text-primary)" font-size="9" font-family="var(--font-mono)" font-weight="700" text-anchor="middle">₹${shortenAmount(day.amount)}</text>
            `;
          }

          // Label text below the bar
          svgHtml += `
            <text x="${x + barWidth/2}" y="130" fill="var(--text-tertiary)" font-size="10" font-family="var(--font-mono)" font-weight="600" text-anchor="middle">${day.dayName}</text>
          `;
        });

        trendChart.innerHTML = svgHtml;
      }

      function shortenAmount(amt) {
        if (amt >= 1000) {
          return (amt / 1000).toFixed(amt % 1000 === 0 ? 0 : 1) + 'k';
        }
        return Math.round(amt);
      }

      // Render the expense items
      function render() {
        calculateSummary();
        renderChart();

        if (expenses.length === 0) {
          emptyState.style.display = 'block';
          expenseList.style.display = 'none';
          expenseList.innerHTML = '';
          return;
        }

        emptyState.style.display = 'none';
        expenseList.style.display = 'flex';

        // Sort: date newest first, then tiebreak by ID creation newest first
        const sorted = [...expenses].sort((a, b) => {
          const dateDiff = parseLocalDate(b.date) - parseLocalDate(a.date);
          if (dateDiff !== 0) return dateDiff;
          return b.id.localeCompare(a.id);
        });

        expenseList.innerHTML = sorted.map(item => `
          <div class="expense-item" data-id="${item.id}">
            <div class="expense-info">
              <span class="expense-desc">${escapeHtml(item.desc)}</span>
              <span class="expense-date">${formatLongDate(item.date)}</span>
            </div>
            <div class="expense-meta">
              <span class="expense-amt">${formatRupee(item.amount)}</span>
              <button class="action-btn edit" data-action="edit" data-id="${item.id}" aria-label="Edit item">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                  <path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                </svg>
              </button>
              <button class="action-btn delete" data-action="delete" data-id="${item.id}" aria-label="Delete item">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="3 6 5 6 21 6"></polyline>
                  <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                  <line x1="10" y1="11" x2="10" y2="17"></line>
                  <line x1="14" y1="11" x2="14" y2="17"></line>
                </svg>
              </button>
            </div>
          </div>
        `).join('');
      }

      function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>"']/g, c => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;'
        }[c]));
      }

      // Add expense form handler
      expenseForm.addEventListener('submit', async function (e) {
        e.preventDefault();
        const desc = expDesc.value.trim();
        const amt = parseFloat(expAmount.value);
        const date = expDate.value;

        if (!desc || isNaN(amt) || amt <= 0 || !date) return;

        addExpBtn.disabled = true;
        const originalBtnHtml = addExpBtn.innerHTML;
        addExpBtn.innerHTML = `
          <div style="display: inline-block; width: 12px; height: 12px; border: 2px solid var(--bg); border-radius: 50%; border-top-color: var(--text-primary); animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 6px;"></div>
          Logging...
        `;

        try {
          const res = await databases.createDocument(
            DATABASE_ID,
            COLLECTION_ID,
            Appwrite.ID.unique(), // Appwrite ID unique
            {
              title: desc,
              amount: amt.toString(), // amount stored as string/text
              date: date
            }
          );

          expenses.push({
            id: res.$id,
            desc: res.title,
            amount: parseFloat(res.amount) || 0,
            date: res.date
          });

          // Save local backup cache
          try {
            localStorage.setItem('local_expenses_backup', JSON.stringify(expenses));
          } catch(e) {}

          render();

          // Reset fields (keeping the date as the one just entered for rapid logging)
          expDesc.value = '';
          expAmount.value = '';
          expDesc.focus();
        } catch (err) {
          console.error(err);
          alert('Failed to log expense: ' + (err.message || err));
        } finally {
          addExpBtn.disabled = false;
          addExpBtn.innerHTML = originalBtnHtml;
        }
      });

      // Expense list action handler
      expenseList.addEventListener('click', async function (e) {
        const btn = e.target.closest('button');
        if (!btn) return;
        
        const action = btn.getAttribute('data-action');
        const id = btn.getAttribute('data-id');
        if (!action || !id) return;

        if (action === 'delete') {
          if (confirm('Are you sure you want to delete this expenditure?')) {
            const itemEl = document.querySelector(`.expense-item[data-id="${id}"]`);
            if (itemEl) itemEl.style.opacity = '0.4';
            
            try {
              await databases.deleteDocument(DATABASE_ID, COLLECTION_ID, id);
              expenses = expenses.filter(item => item.id !== id);
              
              try {
                localStorage.setItem('local_expenses_backup', JSON.stringify(expenses));
              } catch(e) {}

              render();
            } catch (err) {
              console.error(err);
              alert('Failed to delete expense: ' + (err.message || err));
              if (itemEl) itemEl.style.opacity = '1';
            }
          }
        } else if (action === 'edit') {
          const item = expenses.find(x => x.id === id);
          if (item) {
            editingExpenseId = id;
            editId.value = item.id;
            editDesc.value = item.desc;
            editAmount.value = item.amount;
            editDate.value = item.date;
            
            editModal.classList.add('show');
            editModal.setAttribute('aria-hidden', 'false');
            editDesc.focus();
          }
        }
      });

      // Close modal helpers
      function closeModal() {
        editModal.classList.remove('show');
        editModal.setAttribute('aria-hidden', 'true');
        editingExpenseId = null;
      }
      closeModalBtn.addEventListener('click', closeModal);
      cancelModalBtn.addEventListener('click', closeModal);
      
      // Save edited modal changes
      saveModalBtn.addEventListener('click', async function () {
        const id = editId.value;
        const desc = editDesc.value.trim();
        const amt = parseFloat(editAmount.value);
        const date = editDate.value;

        if (!desc || isNaN(amt) || amt <= 0 || !date) return;

        saveModalBtn.disabled = true;
        const originalBtnText = saveModalBtn.textContent;
        saveModalBtn.textContent = 'Saving...';

        try {
          await databases.updateDocument(
            DATABASE_ID,
            COLLECTION_ID,
            id,
            {
              title: desc,
              amount: amt.toString(),
              date: date
            }
          );

          expenses = expenses.map(item => {
            if (item.id === id) {
              return { ...item, desc, amount: amt, date };
            }
            return item;
          });

          try {
            localStorage.setItem('local_expenses_backup', JSON.stringify(expenses));
          } catch(e) {}

          closeModal();
          render();
        } catch (err) {
          console.error(err);
          alert('Failed to save changes: ' + (err.message || err));
        } finally {
          saveModalBtn.disabled = false;
          saveModalBtn.textContent = originalBtnText;
        }
      });

      // Close modal on escape or clicking outside card
      window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && editModal.classList.contains('show')) closeModal();
      });
      editModal.addEventListener('click', (e) => {
        if (e.target === editModal) closeModal();
      });

      // Initialize
      function init() {
        expDate.value = getTodayDateString();
        fetchExpenses();
      }

      init();

    })();
  </script>
</body>
</html>
