<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0b">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Fitness Logs</title>
  <script src="https://cdn.jsdelivr.net/npm/appwrite@26.1.0"></script>
  <script src="topbar.js" defer></script>
  <style>
    :root {
      --bg: #0A0A0B;
      --bg-deep: #050506;
      --bg-card: rgba(255, 255, 255, 0.04);
      --bg-secondary: rgba(255, 255, 255, 0.025);
      --bg-input: rgba(0, 0, 0, 0.28);
      --border: rgba(255, 255, 255, 0.06);
      --border-soft: rgba(255, 255, 255, 0.04);
      --border-strong: rgba(255, 255, 255, 0.12);
      
      --glass-bg: rgba(255, 255, 255, 0.04);
      --glass-border: rgba(255, 255, 255, 0.06);
      --glass-border-strong: rgba(255, 255, 255, 0.12);
      --glass-shadow: 
        0 1px 0 0 rgba(255, 255, 255, 0.06) inset,
        0 12px 40px rgba(0, 0, 0, 0.45),
        0 1px 2px rgba(0, 0, 0, 0.25);

      --text-primary: #FAFAFA;
      --text-secondary: #B8B6B0;
      --text-tertiary: #76746E;
      
      --accent: #E07658; /* Coral accent */
      --danger: #FF6B6B;
      --success: #6BE3A4;
      
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      color-scheme: dark;
    }

    /* Light Theme variables matching the topbar overrides */
    html.light-theme {
      --bg: #F4F4F6;
      --bg-deep: #EAEAEF;
      --bg-card: #FFFFFF;
      --bg-secondary: #F8F8FA;
      --bg-input: #F3F3F6;
      --border: rgba(0, 0, 0, 0.08);
      --border-soft: rgba(0, 0, 0, 0.05);
      --border-strong: rgba(0, 0, 0, 0.15);
      
      --glass-bg: #FFFFFF;
      --glass-border: rgba(0, 0, 0, 0.06);
      --glass-border-strong: rgba(0, 0, 0, 0.1);
      --glass-shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
      
      --text-primary: #1A1A1E;
      --text-secondary: #4A4A52;
      --text-tertiary: #8A8A96;
      
      color-scheme: light !important;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      min-height: 100%;
    }

    /* Subtle backdrop washes */
    body::before {
      content: '';
      position: fixed;
      inset: -10%;
      z-index: -2;
      background:
        radial-gradient(60% 45% at 82% 14%, rgba(224, 118, 88, 0.12) 0%, transparent 55%),
        radial-gradient(55% 45% at 18% 90%, rgba(180, 180, 200, 0.04) 0%, transparent 55%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
      filter: blur(40px) saturate(1.05);
      pointer-events: none;
    }
    
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
      background-size: 3px 3px;
      opacity: 0.7;
      pointer-events: none;
    }

    html.light-theme body::after {
      background-image: radial-gradient(rgba(0, 0, 0, 0.02) 1px, transparent 1px) !important;
    }

    .shell {
      max-width: 640px;
      margin: 0 auto;
      padding-top: max(24px, env(safe-area-inset-top));
      padding-left: max(16px, env(safe-area-inset-left));
      padding-right: max(16px, env(safe-area-inset-right));
      padding-bottom: max(60px, env(safe-area-inset-bottom));
    }

    /* Back Button styling */
    .fin-back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px 8px 10px;
      margin: 0 0 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s ease, color 0.15s ease;
    }
    .fin-back-btn:hover {
      background: var(--border-soft);
      color: var(--text-primary);
    }
    .fin-back-btn svg { display: block; }

    /* Heading styling */
    .dash-title {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 24px;
      background: linear-gradient(180deg, var(--text-primary) 0%, var(--text-secondary) 120%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: var(--text-primary);
    }
    html.light-theme .dash-title {
      background: linear-gradient(180deg, #1A1A1E 0%, #5A5A66 120%) !important;
      -webkit-background-clip: text !important;
      background-clip: text !important;
      color: transparent !important;
    }

    .section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
    }

    .workout-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      border-radius: var(--radius-lg);
      padding: 20px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      margin-bottom: 32px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 14px;
    }
    .form-group label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
    }
    .input-field {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 14px;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    .input-field:focus {
      border-color: var(--accent);
      outline: none;
      box-shadow: 0 0 0 2px rgba(224, 118, 88, 0.15);
    }
    .input-field::placeholder {
      color: var(--text-tertiary);
    }
    
    .btn-log {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      background: var(--text-primary);
      color: var(--bg);
      border: none;
      border-radius: var(--radius-md);
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s, transform 0.10s;
    }
    .btn-log:hover {
      opacity: 0.9;
    }
    .btn-log:active {
      transform: scale(0.97);
    }
    .btn-log:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    
    /* Workout List Section */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-tertiary);
      font-size: 14px;
      border: 1px dashed var(--border);
      border-radius: var(--radius-lg);
    }

    .workout-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .workout-item {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-md);
      transition: background 0.15s, border-color 0.15s, opacity 0.2s;
    }
    .workout-item:hover {
      background: var(--bg-card);
      border-color: var(--border);
    }
    .workout-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }
    .workout-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .workout-date {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-tertiary);
      margin-top: 2px;
    }
    .workout-details {
      font-size: 13.5px;
      line-height: 1.5;
      color: var(--text-secondary);
      white-space: pre-wrap;
      background: rgba(0, 0, 0, 0.1);
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      border-left: 2px solid var(--border-strong);
    }
    html.light-theme .workout-details {
      background: rgba(0, 0, 0, 0.02) !important;
    }
    .workout-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 4px;
    }
    
    .action-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px 10px;
      background: transparent;
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-sm);
      color: var(--text-tertiary);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.15s, background 0.15s, border-color 0.15s;
    }
    .action-btn:hover {
      color: var(--text-primary);
      background: var(--bg-card);
      border-color: var(--border);
    }
    .action-btn.delete:hover {
      color: var(--danger);
      background: rgba(255, 107, 107, 0.08);
      border-color: rgba(255, 107, 107, 0.15);
    }

    /* Modal Styling */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
      padding: 16px;
    }
    .modal-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }
    .modal-card {
      width: 100%;
      max-width: 440px;
      background: var(--bg);
      border: 1px solid var(--glass-border-strong);
      box-shadow: var(--glass-shadow);
      border-radius: var(--radius-lg);
      padding: 24px;
      transform: scale(0.95);
      transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .modal-overlay.show .modal-card {
      transform: scale(1);
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .modal-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .modal-close {
      background: transparent;
      border: none;
      color: var(--text-tertiary);
      cursor: pointer;
      padding: 4px;
    }
    .modal-close:hover {
      color: var(--text-primary);
    }
    .modal-body {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 24px;
    }
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    
    .btn-secondary {
      padding: 10px 16px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .btn-secondary:hover {
      background: var(--bg-card);
      color: var(--text-primary);
    }
    .btn-primary {
      padding: 10px 18px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius-md);
      color: #FFFFFF;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-primary:hover {
      opacity: 0.9;
    }
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="shell">
    <!-- Back to Dashboard -->
    <a href="index.html" class="fin-back-btn" id="backBtn" aria-label="Back to dashboard">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
      Back
    </a>

    <!-- Title -->
    <h1 class="dash-title">Workouts</h1>

    <!-- Log Workout Form -->
    <section aria-label="Log new workout">
      <div class="section-title">Log Workout</div>
      <div class="workout-card">
        <form id="workoutForm">
          <div class="form-group">
            <label for="workoutName">Workout Name</label>
            <input type="text" id="workoutName" class="input-field" placeholder="e.g. Push A, Leg Day, 5k Run" required autocomplete="off">
          </div>
          <div class="form-group">
            <label for="workoutDetails">Details (sets, reps, weights, duration)</label>
            <textarea id="workoutDetails" class="input-field" rows="4" placeholder="e.g.&#10;Bench Press: 3x8 @ 70kg&#10;Incline Dumbbell: 3x12 @ 24kg&#10;Tricep Pushdowns: 3x12" required style="resize: vertical; font-family: inherit;"></textarea>
          </div>
          <div class="form-group" style="margin-bottom: 20px;">
            <label for="workoutDate">Date</label>
            <input type="date" id="workoutDate" class="input-field" required>
          </div>
          <button type="submit" class="btn-log" id="logBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            Log Workout
          </button>
        </form>
      </div>
    </section>

    <!-- Workout History List -->
    <section aria-label="Workout History">
      <div class="section-title">Workout History</div>
      <div id="loadingState" class="empty-state" style="border-style: dashed;">
        <div style="display: inline-block; width: 14px; height: 14px; border: 2px solid var(--text-tertiary); border-radius: 50%; border-top-color: var(--text-primary); animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px;"></div>
        Loading workouts from Appwrite...
      </div>
      <div id="emptyState" class="empty-state" style="display: none;">No workouts logged yet.</div>
      <div id="errorState" class="empty-state" style="display: none; border-color: var(--danger); color: var(--danger);">Failed to connect to Appwrite.</div>
      <div id="workoutList" class="workout-list" style="display: none;"></div>
    </section>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="editModal" aria-hidden="true" role="dialog">
    <div class="modal-card">
      <div class="modal-header">
        <h2 class="modal-title">Edit Workout</h2>
        <button class="modal-close" id="closeModalBtn" aria-label="Close modal">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editId">
        <div class="form-group">
          <label for="editName">Workout Name</label>
          <input type="text" id="editName" class="input-field" required autocomplete="off">
        </div>
        <div class="form-group">
          <label for="editDetails">Details</label>
          <textarea id="editDetails" class="input-field" rows="5" required style="resize: vertical; font-family: inherit;"></textarea>
        </div>
        <div class="form-group">
          <label for="editDate">Date</label>
          <input type="date" id="editDate" class="input-field" required>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="cancelModalBtn">Cancel</button>
        <button class="btn-primary" id="saveModalBtn">Save Changes</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      'use strict';

      // Appwrite Configuration
      const client = new Appwrite.Client();
      client
        .setEndpoint('https://sgp.cloud.appwrite.io/v1')
        .setProject('6a524830000a1a6c4eee');

      const databases = new Appwrite.Databases(client);
      const DATABASE_ID = '6a52491c00049194c4d1';
      const COLLECTION_ID = 'fitness_logs';

      let workouts = [];
      let editingWorkoutId = null;

      // DOM Selectors
      const workoutForm = document.getElementById('workoutForm');
      const workoutName = document.getElementById('workoutName');
      const workoutDetails = document.getElementById('workoutDetails');
      const workoutDate = document.getElementById('workoutDate');
      const logBtn = document.getElementById('logBtn');
      
      const loadingState = document.getElementById('loadingState');
      const emptyState = document.getElementById('emptyState');
      const errorState = document.getElementById('errorState');
      const workoutList = document.getElementById('workoutList');

      // Edit Modal DOM Selectors
      const editModal = document.getElementById('editModal');
      const editId = document.getElementById('editId');
      const editName = document.getElementById('editName');
      const editDetails = document.getElementById('editDetails');
      const editDate = document.getElementById('editDate');
      const closeModalBtn = document.getElementById('closeModalBtn');
      const cancelModalBtn = document.getElementById('cancelModalBtn');
      const saveModalBtn = document.getElementById('saveModalBtn');

      // Date Helpers
      function getTodayDateString() {
        const d = new Date();
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${y}-${m}-${day}`;
      }

      function parseLocalDate(dateStr) {
        if (!dateStr) return new Date();
        const [y, m, d] = dateStr.split('-').map(Number);
        return new Date(y, m - 1, d);
      }

      function formatLongDate(dateStr) {
        const dateObj = parseLocalDate(dateStr);
        return dateObj.toLocaleDateString('en-IN', {
          year: 'numeric',
          month: 'long',
          day: 'numeric'
        });
      }

      // Fetch Workouts from Appwrite
      async function fetchWorkouts() {
        loadingState.style.display = 'block';
        emptyState.style.display = 'none';
        errorState.style.display = 'none';
        workoutList.style.display = 'none';
        
        try {
          const res = await databases.listDocuments(DATABASE_ID, COLLECTION_ID);
          workouts = res.documents.map(doc => ({
            id: doc.$id,
            workout: doc.workout || '',
            details: doc.details || '',
            date: doc.date || ''
          }));
          loadingState.style.display = 'none';
          render();
        } catch (err) {
          console.error('Appwrite fitness logs fetch error:', err);
          loadingState.style.display = 'none';
          errorState.style.display = 'block';
          errorState.textContent = 'Failed to load workouts from Appwrite.';
        }
      }

      // Render Workouts
      function render() {
        if (workouts.length === 0) {
          emptyState.style.display = 'block';
          workoutList.style.display = 'none';
          workoutList.innerHTML = '';
          return;
        }

        emptyState.style.display = 'none';
        workoutList.style.display = 'flex';

        // Sort: newest date first, then tiebreak by ID newest first
        const sorted = [...workouts].sort((a, b) => {
          const dateDiff = parseLocalDate(b.date) - parseLocalDate(a.date);
          if (dateDiff !== 0) return dateDiff;
          return b.id.localeCompare(a.id);
        });

        workoutList.innerHTML = sorted.map(item => `
          <div class="workout-item" data-id="${item.id}">
            <div class="workout-header">
              <div>
                <h3 class="workout-title">${escapeHtml(item.workout)}</h3>
                <div class="workout-date">${formatLongDate(item.date)}</div>
              </div>
            </div>
            <div class="workout-details">${escapeHtml(item.details)}</div>
            <div class="workout-actions">
              <button class="action-btn edit" data-action="edit" data-id="${item.id}">Edit</button>
              <button class="action-btn delete" data-action="delete" data-id="${item.id}">Delete</button>
            </div>
          </div>
        `).join('');
      }

      function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>"']/g, c => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;'
        }[c]));
      }

      // Form Submit handler
      workoutForm.addEventListener('submit', async function (e) {
        e.preventDefault();
        const name = workoutName.value.trim();
        const details = workoutDetails.value.trim();
        const date = workoutDate.value;

        if (!name || !details || !date) return;

        logBtn.disabled = true;
        const originalText = logBtn.innerHTML;
        logBtn.innerHTML = 'Logging...';

        try {
          const res = await databases.createDocument(
            DATABASE_ID,
            COLLECTION_ID,
            Appwrite.ID.unique(),
            {
              workout: name,
              details: details,
              date: date
            }
          );

          workouts.push({
            id: res.$id,
            workout: res.workout,
            details: res.details,
            date: res.date
          });

          render();

          // Reset inputs
          workoutName.value = '';
          workoutDetails.value = '';
          workoutName.focus();
        } catch (err) {
          console.error(err);
          alert('Failed to log workout: ' + (err.message || err));
        } finally {
          logBtn.disabled = false;
          logBtn.innerHTML = originalText;
        }
      });

      // Actions click handler (Edit / Delete)
      workoutList.addEventListener('click', async function (e) {
        const btn = e.target.closest('button');
        if (!btn) return;
        
        const action = btn.getAttribute('data-action');
        const id = btn.getAttribute('data-id');
        if (!action || !id) return;

        if (action === 'delete') {
          if (confirm('Are you sure you want to delete this workout log?')) {
            const itemEl = workoutList.querySelector(`.workout-item[data-id="${id}"]`);
            if (itemEl) itemEl.style.opacity = '0.4';
            
            try {
              await databases.deleteDocument(DATABASE_ID, COLLECTION_ID, id);
              workouts = workouts.filter(w => w.id !== id);
              render();
            } catch (err) {
              console.error(err);
              alert('Failed to delete workout: ' + (err.message || err));
              if (itemEl) itemEl.style.opacity = '1';
            }
          }
        } else if (action === 'edit') {
          const item = workouts.find(w => w.id === id);
          if (item) {
            editingWorkoutId = id;
            editId.value = item.id;
            editName.value = item.workout;
            editDetails.value = item.details;
            editDate.value = item.date;
            
            editModal.classList.add('show');
            editModal.setAttribute('aria-hidden', 'false');
            editName.focus();
          }
        }
      });

      // Close modal helpers
      function closeModal() {
        editModal.classList.remove('show');
        editModal.setAttribute('aria-hidden', 'true');
        editingWorkoutId = null;
      }
      closeModalBtn.addEventListener('click', closeModal);
      cancelModalBtn.addEventListener('click', closeModal);
      
      // Save changes inside edit modal
      saveModalBtn.addEventListener('click', async function () {
        const id = editId.value;
        const name = editName.value.trim();
        const details = editDetails.value.trim();
        const date = editDate.value;

        if (!name || !details || !date) return;

        saveModalBtn.disabled = true;
        const originalText = saveModalBtn.textContent;
        saveModalBtn.textContent = 'Saving...';

        try {
          await databases.updateDocument(
            DATABASE_ID,
            COLLECTION_ID,
            id,
            {
              workout: name,
              details: details,
              date: date
            }
          );

          workouts = workouts.map(w => {
            if (w.id === id) {
              return { ...w, workout: name, details, date };
            }
            return w;
          });

          closeModal();
          render();
        } catch (err) {
          console.error(err);
          alert('Failed to save changes: ' + (err.message || err));
        } finally {
          saveModalBtn.disabled = false;
          saveModalBtn.textContent = originalText;
        }
      });

      // Close modal on escape or clicking outside
      window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && editModal.classList.contains('show')) closeModal();
      });
      editModal.addEventListener('click', (e) => {
        if (e.target === editModal) closeModal();
      });

      // Initialize page
      function init() {
        workoutDate.value = getTodayDateString();
        fetchWorkouts();
      }

      init();

    })();
  </script>
</body>
</html>
